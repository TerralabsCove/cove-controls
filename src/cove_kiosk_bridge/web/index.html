  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

ign-items:center;justify-content:space-between;\n    padding:0 48px;\n    border-bottom:1px solid rgba(157,218,163,.15);\n    background:linear-gradient(180deg, rgba(5,16,13,.85), rgba(5,16,13,0));\n  }\n  .logo{display:flex;align-items:center;gap:18px}\n  .logo img{height:52px;width:auto;display:block}\n  .logo .divider{width:1px;height:28px;background:rgba(157,218,163,.25)}\n  .logo .robot{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--green)}\n  .logo .robot b{color:var(--cream);font-family:\"Instrument Sans\";font-weight:700;font-size:18px;letter-spacing:-0.01em;text-transform:none;margin-right:10px;vertical-align:-2px}\n  .topbar .meta{display:flex;gap:28px;align-items:center;font-size:12px;color:rgba(238,241,246,.6);text-transform:uppercase;letter-spacing:.18em}\n  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:8px;vertical-align:middle;box-shadow:0 0 8px var(--green)}\n  .dot.err{background:var(--err);box-shadow:0 0 8px var(--err)}\n  .dot.idle{background:var(--teal-2);box-shadow:0 0 8px var(--teal-2)}\n\n  /* Main grid */\n  .grid{\n    position:absolute;top:88px;left:0;right:0;bottom:72px;z-index:3;\n    display:grid;\n    grid-template-columns: 1fr 680px;\n  }\n\n  /* Left hero */\n  .hero{\n    position:relative;padding:64px 48px 56px 64px;display:flex;flex-direction:column;justify-content:space-between;\n    border-right:1px solid rgba(157,218,163,.12);\n  }\n  .eyebrow{\n    font-size:12px;letter-spacing:.25em;text-transform:uppercase;color:var(--teal-2);\n    display:flex;align-items:center;gap:12px;\n  }\n  .eyebrow .bar{flex:0 0 32px;height:1px;background:var(--teal-2)}\n  h1.headline{\n    font-family:\"Instrument Sans\";font-weight:700;font-size:112px;line-height:.94;\n    color:var(--lime);\n    margin:20px 0 0;letter-spacing:-0.03em;text-wrap:balance;max-width:960px;\n  }\n  h1.headline em{font-style:italic;color:var(--cream);font-weight:700}\n  .sub{\n    margin-top:28px;max-width:760px;font-size:22px;line-height:1.45;color:rgba(238,241,246,.78);\n  }\n  .sub b{color:var(--green);font-weight:500}\n\n  .hero-figure{\n    position:absolute;right:-40px;bottom:130px;width:560px;height:560px;\n    pointer-events:none;z-index:2;opacity:.95;\n  }\n  .hero-figure img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 40px 80px rgba(0,0,0,.5))}\n\n  /* Order button */\n  .order-block{position:relative;z-index:4;display:flex;align-items:flex-end;gap:48px;}\n  .order-btn{\n    position:relative;\n    width:420px;height:420px;border-radius:50%;\n    background:radial-gradient(circle at 30% 25%, var(--lime) 0%, var(--green) 60%, #7BC285 100%);\n    border:none;cursor:pointer;\n    font-family:\"Instrument Sans\";font-weight:700;font-size:60px;color:var(--ink);\n    letter-spacing:-0.02em;line-height:.95;\n    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;\n    box-shadow: 0 30px 80px rgba(157,218,163,.25), inset 0 -8px 24px rgba(0,0,0,.1), inset 0 8px 24px rgba(255,255,255,.35);\n    transition: transform .2s ease, filter .3s ease;\n    overflow:hidden;flex:0 0 420px;\n  }\n  .order-btn:hover{transform:scale(1.02)}\n  .order-btn:active{transform:scale(.98)}\n  .order-btn[disabled]{filter:grayscale(.6) brightness(.55);cursor:not-allowed}\n  .order-btn .tap{\n    font-family:\"DM Mono\";font-weight:500;font-size:14px;letter-spacing:.25em;\n    text-transform:uppercase;opacity:.7;margin-top:6px;\n  }\n  .order-btn::before{\n    content:\"\";position:absolute;inset:-2px;border-radius:50%;\n    border:1px dashed rgba(15,30,26,.3);\n    animation: spin 60s linear infinite;\n  }\n  .order-btn::after{\n    content:\"\";position:absolute;inset:18px;border-radius:50%;\n    border:1px solid rgba(15,30,26,.12);\n  }\n  .pulse-ring{\n    position:absolute;inset:0;border-radius:50%;pointer-events:none;\n    border:2px solid var(--lime);\n    animation: pulse 2.4s ease-out infinite;opacity:0;\n  }\n  @keyframes pulse{ 0%{transform:scale(1);opacity:.55} 100%{transform:scale(1.35);opacity:0} }\n  @keyframes spin{to{transform:rotate(360deg)}}\n\n  .order-meta{flex:1;padding-bottom:6px;max-width:420px}\n  .order-meta .big{font-family:\"Instrument Sans\";font-weight:700;font-size:64px;color:var(--cream);line-height:.95;letter-spacing:-0.03em}\n  .order-meta .big em{font-style:italic;color:var(--green);font-weight:700}\n  .order-meta .note{font-size:13px;color:rgba(238,241,246,.5);letter-spacing:.18em;text-transform:uppercase;margin-top:14px;line-height:1.7}\n  .specs{margin-top:26px;display:flex;gap:36px;font-size:12px;color:rgba(238,241,246,.55);letter-spacing:.15em;text-transform:uppercase}\n  .specs div span{display:block;color:var(--green);font-size:20px;margin-top:6px;letter-spacing:0;text-transform:none;font-family:\"Instrument Sans\";font-weight:600}\n\n  /* Right rail */\n  .rail{\n    position:relative;display:flex;flex-direction:column;background:var(--ink-2);\n    padding:28px;gap:18px;\n  }\n  .card{\n    background:var(--ink);border:1px solid rgba(157,218,163,.1);\n    border-radius:2px;padding:22px 24px;position:relative;\n  }\n  .card h3{\n    margin:0 0 16px;font-family:\"DM Mono\";font-weight:500;font-size:12px;\n    letter-spacing:.25em;text-transform:uppercase;color:var(--teal-2);\n    display:flex;justify-content:space-between;align-items:center;\n  }\n  .card h3 .tag{color:rgba(238,241,246,.4);font-weight:400;font-size:11px}\n\n  /* Timeline */\n  .timeline{position:relative;padding-left:24px}\n  .timeline::before{\n    content:\"\";position:absolute;left:8px;top:6px;bottom:6px;width:1px;\n    background:repeating-linear-gradient(to bottom, rgba(157,218,163,.3) 0 4px, transparent 4px 8px);\n  }\n  .step{position:relative;padding:10px 0;display:flex;align-items:center;gap:16px;transition:all .3s}\n  .step::before{\n    content:\"\";position:absolute;left:-24px;top:50%;transform:translateY(-50%);\n    width:17px;height:17px;border-radius:50%;\n    background:var(--ink);border:1px solid rgba(157,218,163,.3);transition:all .3s;\n  }\n  .step .label{font-family:\"Instrument Sans\";font-weight:600;font-size:22px;color:rgba(238,241,246,.35);letter-spacing:-0.01em;transition:color .3s}\n  .step .eta{margin-left:auto;font-size:12px;color:rgba(238,241,246,.35);letter-spacing:.1em;text-transform:uppercase;font-variant-numeric:tabular-nums}\n  .step.done::before{background:var(--teal-2);border-color:var(--teal-2);box-shadow:0 0 0 3px rgba(57,175,163,.2)}\n  .step.done .label{color:rgba(238,241,246,.55)}\n  .step.active::before{\n    background:var(--lime);border-color:var(--lime);\n    box-shadow:0 0 0 4px rgba(218,240,164,.25), 0 0 20px var(--lime);\n    animation: pulsedot 1.3s ease-in-out infinite;\n  }\n  .step.active .label{color:var(--lime)}\n  .step.active .eta{color:var(--green)}\n  @keyframes pulsedot{ 0%,100%{box-shadow:0 0 0 4px rgba(218,240,164,.25), 0 0 16px var(--lime)} 50%{box-shadow:0 0 0 7px rgba(218,240,164,.1), 0 0 28px var(--lime)} }\n  .step.err::before{background:var(--err);border-color:var(--err)}\n  .step.err .label{color:var(--err)}\n\n  /* Queue */\n  .queue-row{display:flex;align-items:center;gap:14px;font-size:14px;padding:4px 0}\n  .queue-row .num{\n    width:34px;height:34px;border-radius:50%;display:grid;place-items:center;\n    font-family:\"DM Mono\";font-weight:500;font-size:13px;\n    background:transparent;border:1px solid rgba(157,218,163,.25);color:rgba(238,241,246,.55);\n  }\n  .queue-row.active .num{background:var(--lime);color:var(--ink);border-color:var(--lime)}\n  .queue-row.active{color:var(--lime)}\n  .queue-row.me .num{background:var(--teal-2);color:var(--ink);border-color:var(--teal-2)}\n  .queue-row.me{color:var(--green)}\n  .queue-row.done{opacity:.35}\n  .queue-row .who{flex:1}\n  .queue-row .tstamp{color:rgba(238,241,246,.4);font-size:11px;letter-spacing:.1em;text-transform:uppercase}\n  .queue-empty{color:rgba(238,241,246,.3);font-size:13px;padding:8px 0;font-style:italic}\n\n  /* Slots (pickup) */\n  .slots{display:grid;grid-template-columns:repeat(4, 1fr);gap:10px;margin-top:4px}\n  .slot{\n    aspect-ratio:1/1.3;background:var(--ink-3);border:1px solid rgba(157,218,163,.15);border-radius:2px;\n    position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;\n    overflow:hidden;transition:all .4s;\n  }\n  .slot .n{font-family:\"Instrument Sans\";font-weight:700;font-size:42px;color:rgba(238,241,246,.35);letter-spacing:-0.02em;line-height:1}\n  .slot .status{font-size:10px;color:rgba(238,241,246,.4);letter-spacing:.2em;text-transform:uppercase}\n  .slot::after{\n    content:\"\";position:absolute;inset:auto 8px 8px 8px;height:3px;background:rgba(157,218,163,.1);border-radius:1px;\n  }\n  .slot.occupied{background:var(--ink-2)}\n  .slot.occupied .status{color:var(--teal-2)}\n  .slot.occupied::after{background:var(--teal-2)}\n  .slot.mine{\n    background:var(--lime);border-color:var(--lime);\n    box-shadow:0 0 30px rgba(218,240,164,.35);\n  }\n  .slot.mine .n{color:var(--ink)}\n  .slot.mine .status{color:var(--ink);font-weight:500}\n  .slot.mine::after{background:rgba(15,30,26,.35)}\n  .slot.mine.open{animation: door-open 1.4s ease forwards}\n  @keyframes door-open{\n    50%{transform:perspective(500px) rotateY(-42deg);transform-origin:left center}\n    100%{transform:perspective(500px) rotateY(-75deg);transform-origin:left center;box-shadow:0 0 40px rgba(218,240,164,.55)}\n  }\n\n  /* Bottom bar */\n  .botbar{\n    position:absolute;bottom:0;left:0;right:0;height:72px;z-index:5;\n    display:flex;align-items:center;justify-content:space-between;\n    padding:0 48px;\n    border-top:1px solid rgba(157,218,163,.15);\n    background:linear-gradient(0deg, rgba(5,16,13,.9), rgba(5,16,13,0));\n    font-size:12px;color:rgba(238,241,246,.55);letter-spacing:.2em;text-transform:uppercase;\n  }\n  .botbar .readout{display:flex;gap:40px;align-items:center}\n  .botbar .readout b{color:var(--green); ight:.9}\n  .receipt h2 em{font-style:italic;color:var(--ink)}\n  .receipt .sub2{margin-top:10px;font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--teal)}\n  .receipt .bignum{margin:32px 0;padding:24px;background:var(--teal);color:var(--lime);display:flex;align-items:center;justify-content:space-between}\n  .receipt .bignum .n{font-family:\"Instrument Sans\";font-weight:700;font-size:120px;line-height:1;letter-spacing:-0.04em}\n  .receipt .bignum .l{font-size:11px;letter-spacing:.25em;text-transform:uppercase;max-width:140px;text-align:right;line-height:1.5}\n  .receipt .line{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dashed rgba(15,30,26,.3);font-size:13px}\n  .receipt .line b{font-weight:500}\n  .receipt .close{position:absolute;top:16px;right:16px;background:transparent;border:1px solid var(--ink);width:32px;height:32px;cursor:pointer;font-family:\"DM Mono\";font-size:14px}\n\n  /* Operator */\n  .oppanel{\n    position:absolute;top:88px;right:0;width:420px;height:calc(100% - 160px);z-index:30;\n    background:var(--ink-2);border-left:1px solid var(--green);\n    transform:translateX(100%);transition:transform .35s cubic-bezier(.6,.2,.2,1);\n    padding:32px;overflow-y:auto;\n  }\n  .oppanel.show{transform:translateX(0)}\n  .oppanel h3{font-family:\"Instrument Sans\";font-weight:700;font-size:40px;margin:0 0 4px;color:var(--lime);letter-spacing:-0.02em}\n  .oppanel .sub2{font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--teal-2);margin-bottom:24px}\n  .kv{display:grid;grid-template-columns:1fr auto;gap:8px 16px;font-size:13px;padding:14px 0;border-bottom:1px dashed rgba(157,218,163,.1)}\n  .kv .k{color:rgba(238,241,246,.55);letter-spacing:.1em;text-transform:uppercase;font-size:11px}\n  .kv .v{color:var(--green);font-variant-numeric:tabular-nums;font-size:14px}\n  .op-btns{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}\n  .op-btns button{background:transparent;border:1px solid rgba(157,218,163,.25);color:var(--cream);font-family:\"DM Mono\";font-size:11px;letter-spacing:.15em;text-transform:uppercase;padding:10px 14px;cursor:pointer;flex:1;min-width:100px}\n  .op-btns button:hover{border-color:var(--green);color:var(--green)}\n  .op-btns button.danger{border-color:rgba(232,106,92,.4);color:var(--err)}\n  .op-btns button.danger:hover{background:rgba(232,106,92,.1)}\n\n  /* Hero figure state animations */\n  .hero-figure.float img{animation:float 6s ease-in-out infinite}\n  @keyframes float{ 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-12px) rotate(-1.5deg)} }\n  .hero-figure.working img{animation:work 2.4s ease-in-out infinite}\n  @keyframes work{ 0%,100%{transform:rotate(-2deg) translateY(0)} 25%{transform:rotate(3deg) translateY(-4px)} 50%{transform:rotate(-1deg) translateY(-2px)} 75%{transform:rotate(2deg) translateY(-6px)} }\n\n  .steam{position:absolute;width:120px;height:180px;left:calc(50% - 60px);top:-80px;pointer-events:none;opacity:0}\n  .hero-figure.working .steam{opacity:1}\n  .steam span{position:absolute;bottom:0;width:14px;height:14px;border-radius:50%;background:rgba(238,241,246,.3);filter:blur(6px);animation:steam 3s ease-in-out infinite}\n  .steam span:nth-child(1){left:20px;animation-delay:0s}\n  .steam span:nth-child(2){left:50px;animation-delay:.6s}\n  .steam span:nth-child(3){left:80px;animation-delay:1.2s}\n  .steam span:nth-child(4){left:35px;animation-delay:1.8s}\n  .steam span:nth-child(5){left:65px;animation-delay:2.4s}\n  @keyframes steam{ 0%{transform:translateY(0) scale(.6);opacity:0} 30%{opacity:.55} 100%{transform:translateY(-180px) scale(1.8);opacity:0} }\n\n  /* Pour progress */\n  .fill-indicator{position:absolute;left:64px;bottom:48px;z-index:4;display:none;width:340px}\n  .hero.state-pouring .fill-indicator{display:block}\n  .fill-bar{height:10px;background:rgba(157,218,163,.12);position:relative;overflow:hidden}\n  .fill-bar span{position:absolute;inset:0 auto 0 0;background:linear-gradient(90deg,var(--teal-2),var(--green));width:0%;transition:width .3s linear}\n  .fill-label{font-size:11px;color:rgba(238,241,246,.55);letter-spacing:.2em;text-transform:uppercase;margin-bottom:10px;display:flex;justify-content:space-between}\n  .fill-label b{color:var(--lime);font-weight:500}\n\n  /* Tweaks */\n  .tweaks{position:fixed;right:16px;bottom:16px;z-index:200;width:300px;background:var(--ink-2);border:1px solid var(--green);font-family:\"DM Mono\";font-size:12px;color:var(--cream);display:none}\n  .tweaks.show{display:block}\n  .tweaks h4{margin:0;padding:14px 16px;font-family:\"Instrument Sans\";font-size:18px;color:var(--lime);border-bottom:1px solid rgba(157,218,163,.15);letter-spacing:-0.02em}\n  .tweak-row{padding:12px 16px;border-bottom:1px dashed rgba(157,218,163,.1);display:flex;justify-content:space-between;align-items:center;gap:10px}\n  .tweak-row label{color:rgba(238,241,246,.65);letter-spacing:.1em;text-transform:uppercase;font-size:10px}\n  .tweak-row select, .tweak-row button, .tweak-row input{background:var(--ink);border:1px solid rgba(157,218,163,.2);color:var(--cream);font-family:\"DM Mono\";padding:4px 8px;font-size:11px;cursor:pointer}\n  .tweak-row button:hover{border-color:var(--green);color:var(--green)}\n\n  /* Demo queue seed marker */\n  .activity-ping{animation:ping 2s ease-out}\n  @keyframes ping{0%{background:rgba(218,240,164,.15)}100%{background:transparent}}\n</style>\n</head>\n<body>\n<div id=\"stage\">\n  <div id=\"canvas\">\n\n    <!-- Reticle background -->\n    <div class=\"reticle\">\n      <svg viewBox=\"0 0 1920 1080\" preserveAspectRatio=\"none\">\n        <defs>\n          <pattern id=\"grid\" width=\"80\" height=\"80\" patternUnits=\"userSpaceOnUse\">\n            <path d=\"M 80 0 L 0 0 0 80\" fill=\"none\" stroke=\"rgba(157,218,163,0.04)\" stroke-width=\"1\"></path>\n          </pattern>\n        </defs>\n        <rect width=\"1920\" height=\"1080\" fill=\"url(#grid)\"></rect>\n        <circle cx=\"1360\" cy=\"540\" r=\"460\" fill=\"none\" stroke=\"rgba(24,125,130,0.18)\" stroke-width=\"1\" stroke-dasharray=\"3 8\"></circle>\n        <circle cx=\"1360\" cy=\"540\" r=\"300\" fill=\"none\" stroke=\"rgba(24,125,130,0.14)\" stroke-width=\"1\" stroke-dasharray=\"3 8\"></circle>\n      </svg>\n    </div>\n\n    <!-- Top bar -->\n    <div class=\"topbar\">\n      <div class=\"logo\">\n        <img src=\"e69c4154-0a53-443d-a718-c2b57720eb3e\" alt=\"terralabs.\">\n        <div class=\"divider\"></div>\n        <div class=\"robot\"><b>Cove</b>matcha unit \u00b7 r-01</div>\n      </div>\n      <div class=\"meta\">\n        <div><span class=\"dot idle\" id=\"sysdot\"></span><span id=\"sysstatus\">System \u00b7 Nominal</span></div>\n        <div id=\"clock\">\u2014 \u00b7 \u2014</div>\n        <div>LAB B \u00b7 BAY 03</div>\n      </div>\n    </div>\n\n    <div class=\"corner tl\"></div>\n    <div class=\"corner tr\"></div>\n    <div class=\"corner bl\"></div>\n    <div class=\"corner br\"></div>\n\n    <!-- Main grid -->\n    <div class=\"grid\">\n\n      <!-- LEFT hero -->\n      <div class=\"hero\" id=\"hero\">\n        <div>\n          <div class=\"eyebrow\"><span class=\"bar\"></span><span id=\"eyebrow-label\">cove \u00b7 r-01 \u00b7 ceremonial grade</span></div>\n          <h1 class=\"headline\" id=\"headline\">tap for <em>tea</em>.</h1>\n          <p class=\"sub\" id=\"sub\">\n            Tap the button, the arm will bring you <b>ceremonial grade matcha</b>. <b>Fully automated.</b>\n          </p>\n        </div>\n\n        <div class=\"order-block\">\n          <button class=\"order-btn\" id=\"orderBtn\">\n            <span class=\"pulse-ring\"></span>\n            <span>order</span>\n            <span>matcha</span>\n            <span class=\"tap\">tap to begin</span>\n          </button>\n          <div class=\"order-meta\">\n            <div class=\"big\">ceremonial <em>usucha</em></div>\n            <div class=\"note\">premixed \u00b7 stone-ground tencha<br>served in a compostable cup</div>\n            <div class=\"specs\">\n              <div>yield<span>240ml</span></div>\n              <div>eta<span>~45s</span></div>\n              <div>caffeine<span>~70mg</span></div>\n            </div>\n          </div>\n        </div>\n\n        <!-- Robot figure -->\n        <div class=\"hero-figure float\" id=\"heroFigure\">\n          <div class=\"steam\"><span></span><span></span><span></span><span></span><span></span></div>\n          <img src=\"d7fec764-1049-4b6b-9a49-1b01847b2ee7\" alt=\"cove arm\">\n        </div>\n\n        <div class=\"fill-indicator\">\n          <div class=\"fill-label\"><span>pouring</span><b id=\"fillPct\">0%</b></div>\n          <div class=\"fill-bar\"><span id=\"fillBar\"></span></div>\n        </div>\n      </div>\n\n      <!-- RIGHT rail -->\n      <div class=\"rail\">\n        <div class=\"card\">\n          <h3>status <span class=\"tag\" id=\"statustag\">waiting for input</span></h3>\n          <div class=\"timeline\" id=\"timeline\">\n            <div class=\"step\" data-step=\"idle\"><span class=\"label\">Idle</span><span class=\"eta\">\u2014</span></div>\n            <div class=\"step\" data-step=\"received\"><span class=\"label\">Order received</span><span class=\"eta\">0:03</span></div>\n            <div class=\"step\" data-step=\"pouring\"><span class=\"label\">Pouring</span><span class=\"eta\">0:18</span></div>\n            <div class=\"step\" data-step=\"moving\"><span class=\"label\">Moving to pickup</span><span class=\"eta\">0:12</span></div>\n            <div class=\"step\" data-step=\"arrived\"><span class=\"label\">Delivered</span><span class=\"eta\">\u2014</span></div>\n          </div>\n        </div>\n\n        <div class=\"card\">\n          <h3>pickup slots <span class=\"tag\" id=\"slotstag\">4 slots</span></h3>\n          <div class=\"slots\" id=\"slots\">\n            <div class=\"slot\" data-slot=\"1\"><div class=\"n\">01</div><div class=\"status\">open</div></div>\n            <div class=\"slot\" data-slot=\"2\"><div class=\"n\">02</div><div class=\"status\">open</div></div>\n            <div class=\"slot\" data-slot=\"3\"><div class=\"n\">03</div><div class=\"status\">open</div></div>\n            <div class=\"slot\" data-slot=\"4\"><div class=\"n\">04</div><div class=\"status\">open</div></div>\n          </div>\n        </div>\n\n        <div class=\"card\" style=\"flex:1\">\n          <h3>queue <span class=\"tag\" id=\"queuetag\">no orders</span></h3>\n          <div id=\"queue\"></div>\n        </div>\n      </div>\n    </div>\n\n    <!-- Bottom bar -->\n    <div class=\"botbar\">\n      <div class=\"readout\">\n        <div>cups<b id=\"r-cups\">148</b></div>\n        <div>served today<b id=\"r-served\">37</b></div>\n        <div>uptime<b id=\"r-uptime\">14d 02:11</b></div>\n      </div>\n      <div style=\"display:flex;gap:10px\">\n        <button class=\"iconbtn on\" id=\"soundBtn\" aria-pressed=\"true\">\n          <svg viewBox=\"0 0 12 12\"><path d=\"M1 4h2l3-3v10L3 8H1z\" fill=\"currentColor\"></path><path d=\"M8 3a4 4 0 0 1 0 6\" stroke=\"currentColor\" fill=\"none\"></path></svg>\n          sound \u00b7 on\n        </button>\n        <button class=\"iconbtn\" id=\"opBtn\">\u25e8 operator</button>\n      </div>\n    </div>\n\n    <!-- Name prompt overlay -->\n    <div class=\"overlay\" id=\"nameOverlay\">\n      <div class=\"namebox\">\n        <div class=\"sub2\">cove \u00b7 new order</div>\n        <h2>what's your <em>name?</em></h2>\n        <div class=\"name-field\">\n          <input type=\"text\" id=\"nameInput\" placeholder=\"type your name\" maxlength=\"20\" autocomplete=\"off\">\n          <div class=\"name-cursor\"></div>\n        </div>\n        <div class=\"keypad\" id=\"keypad\">\n          <!-- keys injected via JS -->\n        </div>\n        <div class=\"name-actions\">\n          <button class=\"cancel\" id=\"nameCancel\">cancel</button>\n          <button class=\"btn primary\" id=\"nameConfirm\" disabled=\"\">confirm order \u2192</button>\n        </div>\n      </div>\n    </div>\n\n    <!-- Receipt overlay -->\n    <div class=\"overlay\" id=\"overlay\">\n      <div class=\"receipt\">\n        <button class=\"close\" id=\"closeReceipt\">\u00d7</button>\n        <div class=\"sub2\">your matcha is ready</div>\n        <h2 id=\"receiptGreeting\">thanks, <em>friend.</em></h2>\n        <div class=\"bignum\">\n          <div class=\"n\" id=\"receiptSlot\">01</div>\n          <div class=\"l\">pickup slot \u00b7 opens for 30s</div>\n        </div>\n        <div class=\"line\"><span>order</span><b id=\"receiptId\">#2617</b></div>\n        <div class=\"line\"><span>prepared by</span><b>cove \u00b7 r-01</b></div>\n        <div class=\"line\"><span>volume</span><b>240ml usucha</b></div>\n        <div class=\"line\"><span>time</span><b id=\"receiptTime\">0:43</b></div>\n        <div style=\"margin-top:24px;font-size:11px;color:var(--teal);letter-spacing:.22em;text-transform:uppercase\">thank you \u2014 terralabs.</div>\n      </div>\n    </div>\n\n    <!-- Operator -->\n    <div class=\"oppanel\" id=\"oppanel\">\n      <div class=\"sub2\">internal / cove r-01</div>\n      <h3>operator</h3>\n      <div class=\"kv\"><span class=\"k\">uptime</span><span class=\"v\">14d 02:11:08</span></div>\n      <div class=\"kv\"><span class=\"k\">arm temp</span><span class=\"v\">38.2\u00b0C</span></div>\n      <div class=\"kv\"><span class=\"k\">cup stack</span><span class=\"v\">148 / 200</span></div>\n      <div class=\"kv\"><span class=\"k\">last calibration</span><span class=\"v\">2026-04-19 \u00b7 08:14</span></div>\n      <div class=\"kv\"><span class=\"k\">drinks today</span><span class=\"v\">37 \u00b7 avg 43s</span></div>\n      <div class=\"kv\"><span class=\"k\">errors / 24h</span><span class=\"v\">0</span></div>\n      <div class=\"kv\"><span class=\"k\">queue mode</span><span class=\"v\" id=\"op-mode\">auto-run</span></div>\n      <div class=\"kv\"><span class=\"k\">orders queued</span><span class=\"v\" id=\"op-qcount\">0</span></div>\n\n      <div class=\"op-btns\">\n        <button id=\"addOrderBtn\">add test order</button>\n        <button id=\"addManyBtn\">+3 test orders</button>\n        <button>calibrate</button>\n        <button>clean cycle</button>\n        <button class=\"danger\" id=\"errorBtn\">simulate error</button>\n        <button id=\"resetBtn\">reset demo</button>\n      </div>\n\n      <div style=\"margin-top:32px;font-size:11px;color:rgba(238,241,246,.4);line-height:1.7;letter-spacing:.1em\">\n        cove r-01 \u00b7 firmware 4.2.1 \u00b7 node online \u00b7 telemetry streaming to hub-b\n      </div>\n    </div>\n\n    <!-- Tweaks -->\n    <div class=\"tweaks\" id=\"tweaks\">\n      <h4>Tweaks</h4>\n      <div class=\"tweak-row\">\n        <label>accent hue</label>\n        <input type=\"range\" id=\"tw-hue\" min=\"60\" max=\"140\" value=\"85\" step=\"1\">\n      </div>\n      <div class=\"tweak-row\">\n        <label>headline</label>\n        <select id=\"tw-headline\">\n          <option value=\"tap for &lt;em&gt;tea&lt;/em&gt;.\">tap for tea</option>\n          <option value=\"have a robot &lt;em&gt;hand you&lt;/em&gt; a matcha.\">hand you a matcha</option>\n          <option value=\"matcha, &lt;em&gt;now&lt;/em&gt; \u2014 by cove.\">matcha now</option>\n          <option value=\"ceremonial. &lt;em&gt;automated.&lt;/em&gt;\">ceremonial automated</option>\n        </select>\n      </div>\n      <div class=\"tweak-row\">\n        <label>speed</label>\n        <input type=\"range\" id=\"tw-speed\" min=\"0.3\" max=\"3\" value=\"0.8\" step=\"0.1\">\n      </div>\n      <div class=\"tweak-row\">\n        <label>dotmatrix bg</label>\n        <button id=\"tw-bg\">toggle</button>\n      </div>\n    </div>\n  </div>\n</div>\n\n<script>\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"accentHue\": 140,\n  \"speed\": 3,\n  \"showDotmatrix\": false,\n  \"headline\": \"tap for <em>tea</em>.\"\n}/*EDITMODE-END*/;\n\nconst API_BASE = '';\nconst TESTNAMES = ['A. Chen', 'M. Yong', 'J. Rodriguez', 'I. Chan', 'J. Cappo', 'K. Park', 'R. Tanaka', 'S. Bauer'];\nconst STEPS = ['idle', 'received', 'pouring', 'moving', 'arrived'];\nconst LABELS = {\n  idle: { headline: null, sub: null, tag: 'waiting for input', status: 'System - Nominal', dot: 'idle' },\n  received: { headline: 'order <em>received.</em>', sub: 'Cove reserved your slot and is rotating to the pour station.', tag: 'confirming', status: 'System - Order received', dot: 'idle' },\n  pouring: { headline: 'pouring <em>your matcha.</em>', sub: '240ml ceremonial-grade usucha into a compostable cup.', tag: 'in progress', status: 'System - Pouring', dot: 'idle' },\n  moving: { headline: 'on the <em>way</em>.', sub: 'Cove is navigating to your pickup slot.', tag: 'transit', status: 'System - In transit', dot: 'idle' },\n  arrived: { headline: 'arrived. <em>enjoy.</em>', sub: 'Your slot is open. Lift the door and take your matcha.', tag: 'complete', status: 'System - Delivered', dot: 'idle' },\n  error: { headline: 'we need a <em>minute</em>.', sub: 'A fault was detected and the operator panel is holding the queue.', tag: 'attention required', status: 'System - Fault', dot: 'err' },\n};\n\nlet tw = { ...TWEAK_DEFAULTS };\nlet state = 'idle';\nlet lastAppliedState = null;\nlet queue = [];\nlet currentOrder = null;\nlet servedToday = 37;\nlet remotePhaseProgress = 0;\nlet soundOn = true;\nlet apiOnline = false;\nlet submittingOrder = false;\nlet lastSnapshot = null;\n\nfunction fit() {\n  const c = document.getElementById('canvas');\n  const w = window.innerWidth || document.documentElement.clientWidth;\n  const h = window.innerHeight || document.documentElement.clientHeight;\n  if (!w || !h) {\n    requestAnimationFrame(fit);\n    return;\n  }\n  const s = Math.min(w / 1920, h / 1080);\n  c.style.transform = `scale(${s})`;\n}\nwindow.addEventListener('resize', fit);\nwindow.addEventListener('load', fit);\nrequestAnimationFrame(fit);\nfit();\n\nfunction tick() {\n  const d = new Date();\n  const hh = String(d.getHours()).padStart(2, '0');\n  const mm = String(d.getMinutes()).padStart(2, '0');\n  const ss = String(d.getSeconds()).padStart(2, '0');\n  document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;\n}\ntick();\nsetInterval(tick, 1000);\n\nfunction escapeHtml(value) {\n  return String(value).replace(/[&<>\"']/g, (ch) => (\n    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '\"': '&quot;', \"'\": '&#39;' }[ch]\n  ));\n}\n\nfunction formatSeconds(totalSeconds) {\n  const safe = Math.max(0, Math.round(Number(totalSeconds) || 0));\n  const minutes = Math.floor(safe / 60);\n  const seconds = String(safe % 60).padStart(2, '0');\n  return `${minutes}:${seconds}`;\n}\n\nfunction updateOrderButtonAvailability() {\n  const btn = document.getElementById('orderBtn');\n  const disabled = !apiOnline || submittingOrder || state !== 'idle';\n  btn.disabled = disabled;\n  btn.querySelector('.pulse-ring').style.animationPlayState = disabled ? 'paused' : 'running';\n}\n\nfunction renderQueue() {\n  const q = document.getElementById('queue');\n  const visible = queue.filter((order) => order.status !== 'done' || order.isMe);\n  if (visible.length === 0) {\n    q.innerHTML = '<div class=\"queue-empty\">no orders in queue - Cove is ready.</div>';\n    document.getElementById('queuetag').textContent = 'no orders';\n  } else {\n    q.innerHTML = visible.slice(0, 5).map((order, index) => {\n      const cls = [\n        'queue-row',\n        order.status === 'active' ? 'active' : '',\n        order.isMe ? 'me' : '',\n        order.status === 'done' ? 'done' : '',\n      ].join(' ');\n      const labels = { queued: 'queued', active: 'preparing', done: 'delivered' };\n      return `<div class=\"${cls}\"><span class=\"num\">${index + 1}</span><span class=\"who\">order #${order.id} - ${escapeHtml(order.name)}</span><span class=\"tstamp\">${labels[order.status] || order.status}</span></div>`;\n    }).join('');\n    const queued = queue.filter((order) => order.status === 'queued').length;\n    const active = queue.filter((order) => order.status === 'active').length;\n    document.getElementById('queuetag').textContent = active ? `${queued} waiting - ${active} active` : (queued ? `${queued} waiting` : 'complete');\n  }\n  document.getElementById('op-qcount').textContent = queue.filter((order) => order.status !== 'done').length;\n}\n\nfunction renderSlots() {\n  const slots = document.querySelectorAll('.slot');\n  slots.forEach((slotEl) => {\n    const slotNumber = Number(slotEl.dataset.slot);\n    const order = queue.find((item) => item.slot === slotNumber && item.status !== 'done');\n    const served = queue.find((item) => item.slot === slotNumber && item.status === 'done' && item.isMe);\n    slotEl.classList.remove('occupied', 'mine', 'open');\n    const label = slotEl.querySelector('.status');\n    if (served) {\n      slotEl.classList.add('mine', 'open');\n      label.textContent = 'open ' + served.name;\n    } else if (order) {\n      if (order.isMe) {\n        slotEl.classList.add('mine');\n        label.textContent = order.status === 'active' ? 'reserved' : 'incoming';\n      } else {\n        slotEl.classList.add('occupied');\n        label.textContent = 'occupied';\n      }\n    } else {\n      label.textContent = 'open';\n    }\n  });\n}\n\nfunction setFillProgress(progress) {\n  const pct = Math.max(0, Math.min(1, Number(progress) || 0));\n  document.getElementById('fillBar').style.width = `${Math.round(pct * 100)}%`;\n  document.getElementById('fillPct').textContent = `${Math.round(pct * 100)}%`;\n}\n\nfunction beep(nextState) {\n  if (!soundOn) return;\n  try {\n    const ctx = window.__ac || (window.__ac = new (window.AudioContext || window.webkitAudioContext)());\n    const osc = ctx.createOscillator();\n    const gain = ctx.createGain();\n    const freqs = { received: 660, pouring: 440, moving: 520, arrived: 880, error: 180, idle: 0 };\n    if (!freqs[nextState]) return;\n    osc.frequency.value = freqs[nextState];\n    osc.type = nextState === 'error' ? 'sawtooth' : 'sine';\n    gain.gain.setValueAtTime(0.0001, ctx.currentTime);\n    gain.gain.linearRampToValueAtTime(0.06, ctx.currentTime + 0.01);\n    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.3);\n    osc.connect(gain).connect(ctx.destination);\n    osc.start();\n    osc.stop(ctx.currentTime + 0.3);\n  } catch (err) {\n    console.debug(err);\n  }\n}\n\nfunction applyState(nextState, force = false) {\n  state = nextState;\n  const stateChanged = force || lastAppliedState !== nextState;\n  lastAppliedState = nextState;\n\n  const hero = document.getElementById('hero');\n  STEPS.forEach((step) => hero.classList.remove('state-' + step));\n  hero.classList.remove('state-error');\n  hero.classList.add('state-' + nextState);\n\n  const label = LABELS[nextState] || LABELS.idle;\n  document.getElementById('headline').innerHTML = label.headline || tw.headline;\n  document.getElementById('sub').innerHTML = label.sub || 'Tap the button and the arm will bring you <b>ceremonial grade matcha</b>. <b>Backend controlled.</b>';\n  document.getElementById('statustag').textContent = label.tag;\n  document.getElementById('sysstatus').textContent = label.status;\n\n  const eyebrow = document.getElementById('eyebrow-label');\n  eyebrow.textContent = currentOrder && nextState !== 'idle'\n    ? `order #${currentOrder.id} - ${currentOrder.name}`\n    : 'cove - r-01 - ceremonial grade';\n\n  const sysdot = document.getElementById('sysdot');\n  sysdot.classList.remove('idle', 'err');\n  sysdot.classList.add(label.dot);\n\n  const timelineSteps = document.querySelectorAll('#timeline .step');\n  const idx = STEPS.indexOf(nextState);\n  timelineSteps.forEach((el, index) => {\n    el.classList.remove('done', 'active', 'err');\n    if (nextState === 'error') {\n      if (index < 2) el.classList.add('done');\n      if (index === 2) el.classList.add('err');\n      return;\n    }\n    if (index < idx) el.classList.add('done');\n    else if (index === idx) el.classList.add('active');\n  });\n\n  const fig = document.getElementById('heroFigure');\n  fig.classList.remove('float', 'working');\n  if (nextState === 'idle' || nextState === 'arrived') fig.classList.add('float');\n  if (nextState === 'received' || nextState === 'pouring') fig.classList.add('working');\n\n  updateOrderButtonAvailability();\n  setFillProgress(nextState === 'pouring' ? remotePhaseProgress : 0);\n\n  const overlay = document.getElementById('overlay');\n  if (nextState === 'arrived' && currentOrder && currentOrder.isMe) {\n    document.getElementById('receiptGreeting').innerHTML = `thanks, <em>${escapeHtml(currentOrder.name)}.</em>`;\n    document.getElementById('receiptSlot').textContent = String(currentOrder.slot || 0).padStart(2, '0');\n    document.getElementById('receiptId').textContent = '#' + currentOrder.id;\n    document.getElementById('receiptTime').textContent = formatSeconds((lastSnapshot && lastSnapshot.average_cycle_seconds) || 43);\n    overlay.classList.add('show');\n  } else {\n    overlay.classList.remove('show');\n  }\n\n  renderQueue();\n  renderSlots();\n  if (stateChanged) beep(nextState);\n}\n\nfunction handleOffline(reason) {\n  apiOnline = false;\n  updateOrderButtonAvailability();\n  document.getElementById('statustag').textContent = 'backend offline';\n  document.getElementById('sysstatus').textContent = 'System - Bridge offline';\n  document.getElementById('sub').innerHTML = 'Waiting for the kiosk bridge. Start the ROS kiosk node and reload this page.';\n  console.warn(reason);\n}\n\nfunction applySnapshot(snapshot) {\n  apiOnline = true;\n  lastSnapshot = snapshot;\n  queue = Array.isArray(snapshot.queue) ? snapshot.queue : [];\n  currentOrder = snapshot.current_order || null;\n  servedToday = Number(snapshot.served_today || 0);\n  remotePhaseProgress = Number(snapshot.phase_progress || 0);\n\n  document.getElementById('r-cups').textContent = String(snapshot.cups_remaining ?? 0);\n  document.getElementById('r-served').textContent = String(servedToday);\n  document.getElementById('r-uptime').textContent = snapshot.uptime_human || '0d 00:00';\n  document.getElementById('op-mode').textContent = snapshot.queue_mode || 'auto-run';\n  document.getElementById('op-qcount').textContent = String((snapshot.active_count || 0) + (snapshot.queued_count || 0));\n\n  const operatorLines = document.querySelectorAll('.oppanel .kv .v');\n  if (operatorLines.length >= 6) {\n    operatorLines[0].textContent = snapshot.uptime_human || operatorLines[0].textContent;\n    operatorLines[1].textContent = snapshot.connected ? (snapshot.motion_mode === 'simulated' ? 'simulated' : 'online') : 'waiting';\n    operatorLines[2].textContent = `${snapshot.cups_remaining ?? 0} / ${snapshot.cups_capacity ?? 0}`;\n    operatorLines[3].textContent = snapshot.last_calibration || operatorLines[3].textContent;\n    operatorLines[4].textContent = `${snapshot.served_today ?? 0} - avg ${formatSeconds(snapshot.average_cycle_seconds || 43)}`;\n    operatorLines[5].textContent = snapshot.fault_message ? '1' : '0';\n  }\n\n  applyState(snapshot.state || 'idle');\n\n  if (!snapshot.connected && snapshot.state === 'idle') {\n    document.getElementById('statustag').textContent = 'waiting for robot';\n    document.getElementById('sysstatus').textContent = 'System - Waiting for joint states';\n  }\n  if (snapshot.fault_message) {\n    document.getElementById('sub').innerHTML = escapeHtml(snapshot.fault_message);\n  }\n}\n\nasync function apiRequest(path, options = {}) {\n  const response = await fetch(API_BASE + path, {\n    headers: { 'Content-Type': 'application/json' },\n    cache: 'no-store',\n    ...options,\n  });\n  if (!response.ok) {\n    let detail = response.statusText;\n    try {\n      const body = await response.json();\n      detail = body.error || detail;\n    } catch (err) {\n      console.debug(err);\n    }\n    throw new Error(detail || `request failed: ${response.status}`);\n  }\n  const contentType = response.headers.get('content-type') || '';\n  if (!contentType.includes('application/json')) return null;\n  return response.json();\n}\n\nasync function refreshSnapshot() {\n  try {\n    const snapshot = await apiRequest('/api/state', { method: 'GET' });\n    applySnapshot(snapshot);\n  } catch (err) {\n    handleOffline(err);\n  }\n}\n\nasync function createOrder(name, isMe) {\n  const payload = await apiRequest('/api/orders', {\n    method: 'POST',\n    body: JSON.stringify({ name, isMe }),\n  });\n  await refreshSnapshot();\n  return payload;\n}\n\nfunction openNamePrompt() {\n  if (!apiOnline || state !== 'idle') return;\n  const overlay = document.getElementById('nameOverlay');\n  overlay.classList.add('show');\n  nameInput.value = '';\n  nameConfirm.disabled = true;\n  setTimeout(() => nameInput.focus(), 50);\n}\n\nfunction closeNamePrompt() {\n  document.getElementById('nameOverlay').classList.remove('show');\n}\n\nconst nameInput = document.getElementById('nameInput');\nconst nameConfirm = document.getElementById('nameConfirm');\nnameInput.addEventListener('input', (e) => {\n  nameConfirm.disabled = e.target.value.trim().length === 0 || submittingOrder;\n});\ndocument.getElementById('nameCancel').addEventListener('click', closeNamePrompt);\ndocument.getElementById('nameConfirm').addEventListener('click', async () => {\n  const name = nameInput.value.trim();\n  if (!name) return;\n  submittingOrder = true;\n  updateOrderButtonAvailability();\n  nameConfirm.disabled = true;\n  try {\n    await createOrder(name, true);\n    closeNamePrompt();\n  } catch (err) {\n    alert(err.message || 'Unable to submit order.');\n  } finally {\n    submittingOrder = false;\n    nameConfirm.disabled = nameInput.value.trim().length === 0;\n    updateOrderButtonAvailability();\n  }\n});\n\nconst KEYROWS = [...'QWERTYUIOP', ...'ASDFGHJKL', ...'ZXCVBNM'];\nconst keypad = document.getElementById('keypad');\nKEYROWS.forEach((key) => {\n  const el = document.createElement('div');\n  el.className = 'key';\n  el.textContent = key;\n  el.addEventListener('click', () => {\n    nameInput.value += key;\n    nameInput.dispatchEvent(new Event('input'));\n  });\n  keypad.appendChild(el);\n});\nconst spaceKey = document.createElement('div');\nspaceKey.className = 'key space';\nspaceKey.textContent = 'space';\nspaceKey.addEventListener('click', () => {\n  nameInput.value += ' ';\n  nameInput.dispatchEvent(new Event('input'));\n});\nkeypad.appendChild(spaceKey);\nconst backKey = document.createElement('div');\nbackKey.className = 'key back';\nbackKey.textContent = 'back';\nbackKey.addEventListener('click', () => {\n  nameInput.value = nameInput.value.slice(0, -1);\n  nameInput.dispatchEvent(new Event('input'));\n});\nkeypad.appendChild(backKey);\n\ndocument.getElementById('orderBtn').addEventListener('click', openNamePrompt);\ndocument.getElementById('closeReceipt').addEventListener('click', () => {\n  document.getElementById('overlay').classList.remove('show');\n});\n\ndocument.getElementById('soundBtn').addEventListener('click', () => {\n  soundOn = !soundOn;\n  const soundBtn = document.getElementById('soundBtn');\n  soundBtn.classList.toggle('on', soundOn);\n  soundBtn.innerHTML = soundBtn.innerHTML.replace(/sound \u00b7 (on|off)/, 'sound \u00b7 ' + (soundOn ? 'on' : 'off'));\n});\n\nconst op = document.getElementById('oppanel');\ndocument.getElementById('opBtn').addEventListener('click', () => op.classList.toggle('show'));\ndocument.getElementById('errorBtn').addEventListener('click', async () => {\n  try {\n    await apiRequest('/api/operator/error', { method: 'POST', body: JSON.stringify({}) });\n    await refreshSnapshot();\n  } catch (err) {\n    alert(err.message || 'Unable to trigger fault.');\n  }\n});\ndocument.getElementById('resetBtn').addEventListener('click', async () => {\n  try {\n    await apiRequest('/api/operator/reset', { method: 'POST', body: JSON.stringify({ clearQueue: true }) });\n    op.classList.remove('show');\n    await refreshSnapshot();\n  } catch (err) {\n    alert(err.message || 'Unable to reset queue.');\n  }\n});\ndocument.getElementById('addOrderBtn').addEventListener('click', async () => {\n  const name = TESTNAMES[Math.floor(Math.random() * TESTNAMES.length)];\n  try {\n    await createOrder(name, false);\n  } catch (err) {\n    alert(err.message || 'Unable to add test order.');\n  }\n});\ndocument.getElementById('addManyBtn').addEventListener('click', async () => {\n  try {\n    for (let i = 0; i < 3; i += 1) {\n      const name = TESTNAMES[Math.floor(Math.random() * TESTNAMES.length)];\n      await createOrder(name, false);\n    }\n  } catch (err) {\n    alert(err.message || 'Unable to add test orders.');\n  }\n});\n\nfunction applyTweaks(nextTweaks, hueChanged) {\n  if (hueChanged) {\n    document.documentElement.style.setProperty('--lime', `oklch(0.92 0.14 ${nextTweaks.accentHue})`);\n    document.documentElement.style.setProperty('--green', `oklch(0.80 0.14 ${nextTweaks.accentHue})`);\n  }\n  if (state === 'idle') {\n    document.getElementById('headline').innerHTML = nextTweaks.headline;\n  }\n  document.querySelector('.reticle').style.display = nextTweaks.showDotmatrix ? '' : 'none';\n}\napplyTweaks(tw, false);\n\ndocument.getElementById('tw-hue').addEventListener('input', (e) => {\n  tw.accentHue = Number(e.target.value);\n  applyTweaks(tw, true);\n  persist({ accentHue: tw.accentHue });\n});\ndocument.getElementById('tw-headline').addEventListener('change', (e) => {\n  tw.headline = e.target.value;\n  applyTweaks(tw, false);\n  persist({ headline: tw.headline });\n});\ndocument.getElementById('tw-speed').addEventListener('input', (e) => {\n  tw.speed = Number(e.target.value);\n  persist({ speed: tw.speed });\n});\ndocument.getElementById('tw-bg').addEventListener('click', () => {\n  tw.showDotmatrix = !tw.showDotmatrix;\n  applyTweaks(tw, false);\n  persist({ showDotmatrix: tw.showDotmatrix });\n});\n\nwindow.addEventListener('message', (ev) => {\n  if (!ev.data) return;\n  if (ev.data.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('show');\n  if (ev.data.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('show');\n});\nwindow.parent.postMessage({ type: '__edit_mode_available' }, '*');\nfunction persist(edits) { window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*'); }\n\napplyState('idle', true);\nrenderQueue();\nrenderSlots();\nrefreshSnapshot();\nsetInterval(refreshSnapshot, 1000);\n<\/script>\n\n\n</body></html>"
