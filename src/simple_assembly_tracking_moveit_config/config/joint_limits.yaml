# joint_limits.yaml allows the dynamics properties specified in the URDF to be overwritten or augmented as needed

default_velocity_scaling_factor: 0.1
default_acceleration_scaling_factor: 0.1

# Z-type = DM10010 (150 Nm, 15.71 rad/s)  joints: 1, 3, 5, 7
# Y-type = DM4340  (27 Nm,  5.45 rad/s)   joints: 2, 4, 6
joint_limits:
  revolute_1_0:
    has_velocity_limits: true
    max_velocity: 15.71
    has_acceleration_limits: true
    max_acceleration: 10.0
  revolute_2_0:
    has_velocity_limits: true
    max_velocity: 5.45
    has_acceleration_limits: true
    max_acceleration: 10.0
  revolute_3_0:
    has_velocity_limits: true
    max_velocity: 15.71
    has_acceleration_limits: true
    max_acceleration: 10.0
  revolute_4_0:
    has_velocity_limits: true
    max_velocity: 5.45
    has_acceleration_limits: true
    max_acceleration: 10.0
  revolute_5_0:
    has_velocity_limits: true
    max_velocity: 15.71
    has_acceleration_limits: true
    max_acceleration: 10.0
  revolute_6_0:
    has_velocity_limits: true
